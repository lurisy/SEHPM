  moe_rd_dim: 128
  moe_tau_proto: 0.10
  moe_proto_momentum: 0.90
  moe_update_proto: false
  moe_proto_init_random: false

  moe_exp_threshold: 0.60
  moe_min_outlier_frac: 0.05
  moe_max_experts: 6

  moe_fuse_alpha: 0.7
  moe_route_pool: "cls"
  moe_tie_break_eps: 1e-6
  moe_router_init_std: 0.02

datasets:
  cc_sbu_align:
    vis_processor:
      train:
        name: "blip2_image_eval"
        image_size: 224
    text_processor:
      train:
        name: "blip_caption"

