model:
  arch: mini_gpt4
  model_type: pretrain_vicuna0
  max_txt_len: 64
  end_sym: "###"
  low_resource: False
  prompt_template: '###Human: {} ###Assistant: '
  ckpt: ""
  ckpt_base: './models/checkpoint_dir/'
  llama_model: "./models/vicuna-7b"

  lora_r: 0

  moe_init_experts: 1
  moe_temp: 1.2

  moe_router_noisy: false
  moe_router_noise_scale: 0.03
  moe_router_use_gumbel: false
  moe_router_topk: 0

  moe_eval_mode: "soft"
