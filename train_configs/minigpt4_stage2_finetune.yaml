model:
  arch: mini_gpt4
  model_type: pretrain_vicuna0

  max_txt_len: 64
  end_sym: "###"
  prompt_path: "prompts/alignment.txt"
  prompt_template: '###Human: {} ###Assistant: '
  ckpt: './models/prerained_minigpt4_7b.pth'

  moe_init_experts: 1
  moe_temp: 1.2
  moe_router_noisy: true
  moe_router_noise_scale: 0.03
  moe_router_use_gumbel: true
  moe_router_topk: 0
  moe_train_mode: "soft"
  moe_eval_mode: "soft"
  moe_eval_topk: 0

  moe_rd_dim: 128
  moe_tau_proto: 0.10
  moe_proto_momentum: 0.90
  moe_update_proto: true
  moe_proto_init_random: true

  moe_min_proto_cnt: 5.0

  moe_min_proto_cnt_detect: 1.0

  moe_update_proto_in_detect: false

  moe_exp_threshold: 0.60
  moe_min_outlier_frac: 0.05
  moe_max_experts: 10

  moe_expand_patience: 1
  moe_expand_cooldown: 10

  moe_expand_copy_from: "most_used"
  moe_expand_noise_std: 1e-2

  moe_fuse_alpha: 0.7
  moe_route_pool: "cls"
  moe_tie_break_eps: 1e-6
  moe_router_init_std: 0.02

  router_entropy_lambda: 8e-4
  router_balance_lambda: 2e-3
  rd_lambda: 1e-4
  kd_lambda: 5e-4
  align_lambda: 1e-3

  moe_rd_var_target: 0.06
  moe_rd_var_use_tokens: true
  rd_var_lambda: 1e-3

datasets:
  cc_sbu_align:
    vis_processor:
      train:
        name: "blip2_image_train"
        image_size: 224
    text_processor:
      train:
        name: "blip_caption"

run:
  task: image_text_pretrain
  lr_sched: "linear_warmup_cosine_lr"
  init_lr: 3e-6
  min_lr: 1e-6
  warmup_lr: 1e-7

  weight_decay: 0.05
  max_epoch: 7
  iters_per_epoch: 200
  batch_size_train: 4
  batch_size_eval: 24
  num_workers: 4
  warmup_steps: 200

  moe_expert_lr: 1.8e-5
  moe_router_lr: 1.2e-4
  moe_rd_lr: 1.2e-4
  force_task_expert: false
  moe_lr_mul: 5.0

  moe_lambda_align: 1.0
  moe_lambda_kd: 1.0
  moe_lambda_balance: 0.05
  moe_lambda_entropy: 0.001

  seed: 42
  output_dir: "output/"

  amp: True
  resume_ckpt_path: null

  evaluate: False
  train_splits: ["train"]

  device: "cuda"
  world_size: 1
  dist_url: "env://"
  distributed: false

  moe_detect_before_train: true
  moe_detect_start_task: 1
  moe_detect_batches: 200
  moe_detect_verbose: true
  moe_freeze_old_experts: true
  save_full_every: 0

task_num: 10
